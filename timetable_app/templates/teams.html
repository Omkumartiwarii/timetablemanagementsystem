      /* ── BUILD CARDS ── */
      const grid = document.getElementById("grid");
      members.forEach((m, i) => {
        const c = document.createElement("div");
        c.className = "mcard";

        let avHtml = "";
        if (m.img) {
          avHtml = `
      <img class="av-img" src="${m.img}" alt="${m.name}"
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
      <div class="av-init" style="background:${m.bg};display:none">${m.init}</div>`;
        } else {
          avHtml = `<div class="av-init" style="background:${m.bg}">${m.init}</div>`;
        }

        c.innerHTML = `
    <div class="mcard-bar"></div>
    <div class="mcard-body">
      <span class="mcard-idx">0${i + 1}</span>
      <div class="mcard-av">${avHtml}</div>
      <div class="mcard-name">${m.name}</div>
      <div class="mcard-role">${m.role.replace(" · ", "<br>")}</div>
      <button class="mcard-cta" tabindex="-1" aria-hidden="true">View Profile →</button>
    </div>`;

        c.addEventListener("click", () => openPopup(i));
        grid.appendChild(c);
      });

      /* ── POPUP ── */
      function openPopup(i) {
        const m = members[i];
        const pAv = document.getElementById("pAv");
        pAv.style.background = m.bg;

        if (m.img) {
          pAv.innerHTML = `<img src="${m.img}" alt="${m.name}"
      style="width:100%;height:100%;object-fit:cover;border-radius:50%"
      onerror="this.outerHTML='<span style=\\'font-family:Playfair Display,Georgia,serif;font-size:36px;font-weight:700;color:#d4a853\\'>${m.init}</span>'" />`;
        } else {
          pAv.innerHTML = m.init;
        }

        document.getElementById("pEy").textContent = m.eyebrow;
        document.getElementById("pNm").textContent = m.name;
        document.getElementById("pRl").textContent = m.role;
        document.getElementById("pBio").textContent = m.bio;
        document.getElementById("pBadge").textContent = m.badge;

        document.getElementById("pSoc").innerHTML = m.socials
          .map(
            (s) =>
              `<a href="${s.href}" class="p-soc" title="${s.label}" target="_blank" rel="noopener">
       <i class="${s.icon}"></i></a>`,
          )
          .join("");

        document.getElementById("pSk").innerHTML = m.skills
          .map((s) => `<span class="p-skill">${s}</span>`)
          .join("");

        document.getElementById("pSt").innerHTML = m.stats
          .map(
            ([l, v]) =>
              `<div class="p-stat">
       <span class="p-stat-l">${l}</span>
       <span class="p-stat-v">${v}</span>
     </div>`,
          )
          .join("");

        const ov = document.getElementById("overlay");
        ov.classList.add("open");
        document.body.style.overflow = "hidden";

        // re-trigger popup animation each open
        const pc = ov.querySelector(".pcard");
        pc.style.animation = "none";
        requestAnimationFrame(() => {
          pc.style.animation = "";
        });
        setTimeout(() => document.getElementById("closeBtn").focus(), 380);
      }

      function closePopup() {
        document.getElementById("overlay").classList.remove("open");
        document.body.style.overflow = "";
      }

      document.getElementById("closeBtn").addEventListener("click", closePopup);
      document.getElementById("overlay").addEventListener("click", (e) => {
        if (e.target === document.getElementById("overlay")) closePopup();
      });
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closePopup();
      });
    </script>
