{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Dashboard | Timetable System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <script src="{% static 'js/script.js' %}"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #f4f6f9;
        }

        /* Navbar */
        .navbar {
            background: #2c3e50;
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
        }

        .navbar h2 {
            font-weight: 500;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
        }

        /* Container */
        .container {
            padding: 30px;
        }

        /* Card */
        .card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            max-width: 800px;
            margin: auto;
        }

        .card h3 {
            margin-bottom: 20px;
            color: #2c3e50;
        }

        /* Form */
        .form-group {
            margin-bottom: 15px;
        }

        label {
            font-size: 14px;
            display: block;
            margin-bottom: 5px;
        }

        select {
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        /* Buttons */
        .btn {
            padding: 10px 15px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            margin-right: 10px;
        }

        .btn-primary {
            background: #3498db;
            color: white;
        }

        .btn-success {
            background: #2ecc71;
            color: white;
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
        }

        .actions {
            margin-top: 20px;
        }

    </style>
</head>
<body>

    <!-- NAVBAR -->
    <div class="navbar">
        <h2>Student Dashboard</h2>
        <div>
            <a href="{% url 'timetable' %}">View Timetable</a>
            <a href="{% url 'logout' %}">Logout</a>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="container">
        <div class="card">
            <h3>View Your Timetable</h3>

            <form method="GET">

                <!-- Department -->
                <div class="form-group">
                    <label>Select Department</label>
                    <select name="department">
                        <option value="">All</option>
                        {% for dept in departments %}
                            <option value="{{ dept.id }}">
                                {{ dept.name }}
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Semester -->
                <div class="form-group">
                    <label>Select Semester</label>
                    <select name="semester">
                        <option value="">All</option>
                        {% for sem in semesters %}
                            <option value="{{ sem.id }}">
                                {{ sem.department.name }} - Sem {{ sem.semester_number }}
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Buttons -->
                <div class="actions">
                    <button type="submit" class="btn btn-primary">
                        Apply Filters
                    </button>

                    <a href="{% url 'timetable' %}" class="btn btn-success">
                        View Timetable
                    </a>

                    <a href="{% url 'download' %}" class="btn btn-danger">
                        Download PDF
                    </a>
                </div>

            </form>
        </div>
    </div>

</body>
</html>
