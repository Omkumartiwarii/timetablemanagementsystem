{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Login | Timetable System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        height: 100vh;
        background: linear-gradient(135deg, #2c3e50, #3498db);
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .login-container {
        width: 350px;
        background: #fff;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        text-align: center;
      }

      .toggle-btns {
        display: flex;
        margin-bottom: 20px;
      }

      .toggle-btns button {
        flex: 1;
        padding: 10px;
        border: none;
        cursor: pointer;
        background: #ddd;
      }

      .toggle-btns button.active {
        background: #3498db;
        color: white;
      }

      .input-group {
        margin-bottom: 15px;
        text-align: left;
      }

      .input-group input {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        border: 1px solid #ccc;
        border-radius: 5px;
      }

      .btn {
        width: 100%;
        padding: 10px;
        background: #3498db;
        border: none;
        color: #fff;
        border-radius: 5px;
        cursor: pointer;
      }

      .error {
        color: red;
        font-size: 13px;
        margin-bottom: 10px;
      }
    </style>
  </head>

  <body>
    <div class="login-container">
      <!-- Toggle Buttons -->
      <div class="toggle-btns">
        <button id="adminBtn" class="active" onclick="showAdmin()">
          Admin
        </button>
        <button id="studentBtn" onclick="showStudent()">Student</button>
      </div>

      <!-- Error -->
      {% if messages %} {% for message in messages %}
      <div class="error">{{ message }}</div>
      {% endfor %} {% endif %}

      <!-- ================= ADMIN FORM ================= -->
      <form method="POST" id="adminForm">
        {% csrf_token %}
        <h3>Admin Login</h3>

        <div class="input-group">
          <input
            type="text"
            name="username"
            placeholder="Admin Username"
            required
          />
        </div>

        <div class="input-group">
          <input
            type="password"
            name="password"
            placeholder="Password"
            required
          />
        </div>

        <button type="submit" name="role" value="admin" class="btn">
          Login
        </button>
      </form>

      <!-- ================= STUDENT FORM ================= -->
      <form method="POST" id="studentForm" style="display: none">
        {% csrf_token %}
        <h3>Student Access</h3>

        <div class="input-group">
          <input
            type="text"
            name="enrollment"
            placeholder="Enrollment (optional)"
          />
        </div>

        <button type="submit" name="role" value="student" class="btn">
          Enter
        </button>
      </form>
    </div>

    <script>
      function showAdmin() {
        document.getElementById("adminForm").style.display = "block";
        document.getElementById("studentForm").style.display = "none";
        document.getElementById("adminBtn").classList.add("active");
        document.getElementById("studentBtn").classList.remove("active");
      }

      function showStudent() {
        document.getElementById("adminForm").style.display = "none";
        document.getElementById("studentForm").style.display = "block";
        document.getElementById("studentBtn").classList.add("active");
        document.getElementById("adminBtn").classList.remove("active");
      }
    </script>
  </body>
</html>
